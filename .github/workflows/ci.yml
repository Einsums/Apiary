name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      # Apiary links against the Clang/LLVM development libraries (libTooling).
      # The conda-forge clangdev/llvmdev packages provide the CMake config
      # packages find_package(Clang/LLVM CONFIG) needs.
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: apiary-dev
          create-args: >-
            cmake
            ninja
            clangdev
            llvmdev
            cxx-compiler

      - name: Configure
        run: cmake -S . -B build -GNinja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
